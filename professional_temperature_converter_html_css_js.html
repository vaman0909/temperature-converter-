<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111111, #2b2b2b);
      color: #f5f5f5;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #1a1a1a;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #facc15;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: #cfcfcf;
      margin-bottom: 35px;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      color: #f5f5f5;
    }

    input,
    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    select:focus {
      border-color: #facc15;
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #facc15;
      color: #111;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      background: #eab308;
      transform: translateY(-2px);
    }

    .result {
      margin-top: 30px;
      padding: 25px;
      background: #242424;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .result h2 {
      color: #facc15;
      margin-bottom: 10px;
    }

    .result p {
      font-size: 1.2rem;
      color: #f5f5f5;
    }

    .error {
      color: #ff6b6b;
      margin-top: 12px;
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Temperature Converter</h1>
    <p class="subtitle">
      Convert temperatures between Celsius, Fahrenheit, and Kelvin.
    </p>

    <div class="input-group">
      <label for="temperature">Enter Temperature</label>
      <input type="text" id="temperature" placeholder="Example: 25">
    </div>

    <div class="input-group">
      <label for="fromUnit">Convert From</label>
      <select id="fromUnit">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
    </div>

    <div class="input-group">
      <label for="toUnit">Convert To</label>
      <select id="toUnit">
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="celsius">Celsius (°C)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>
    </div>

    <button class="btn" onclick="convertTemperature()">
      Convert Temperature
    </button>

    <div class="error" id="error"></div>

    <div class="result">
      <h2>Converted Temperature</h2>
      <p id="resultText">--</p>
    </div>
  </div>

  <script>
    function convertTemperature() {
      const tempInput = document.getElementById('temperature').value;
      const fromUnit = document.getElementById('fromUnit').value;
      const toUnit = document.getElementById('toUnit').value;
      const resultText = document.getElementById('resultText');
      const error = document.getElementById('error');

      error.textContent = '';

      if (tempInput.trim() === '' || isNaN(tempInput)) {
        error.textContent = 'Please enter a valid number.';
        resultText.textContent = '--';
        return;
      }

      let temp = parseFloat(tempInput);
      let converted;

      if (fromUnit === toUnit) {
        converted = temp;
      }

      else if (fromUnit === 'celsius' && toUnit === 'fahrenheit') {
        converted = (temp * 9/5) + 32;
      }

      else if (fromUnit === 'fahrenheit' && toUnit === 'celsius') {
        converted = (temp - 32) * 5/9;
      }

      else if (fromUnit === 'celsius' && toUnit === 'kelvin') {
        converted = temp + 273.15;
      }

      else if (fromUnit === 'kelvin' && toUnit === 'celsius') {
        converted = temp - 273.15;
      }

      else if (fromUnit === 'fahrenheit' && toUnit === 'kelvin') {
        converted = (temp - 32) * 5/9 + 273.15;
      }

      else if (fromUnit === 'kelvin' && toUnit === 'fahrenheit') {
        converted = (temp - 273.15) * 9/5 + 32;
      }

      converted = converted.toFixed(2);

      let unitSymbol = '';

      if (toUnit === 'celsius') {
        unitSymbol = '°C';
      }

      else if (toUnit === 'fahrenheit') {
        unitSymbol = '°F';
      }

      else {
        unitSymbol = 'K';
      }

      resultText.textContent = `${converted} ${unitSymbol}`;
    }
  </script>

</body>
</html>
